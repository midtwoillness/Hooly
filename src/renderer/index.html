<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hooly · 萌萌版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 悬浮球模式 -->
    <div id="floatBall" class="float-ball hidden">
      <div class="ball-content">
        <img src="./app-icon.svg" class="ball-svg" alt="icon" />
      </div>
    </div>

    <!-- 主窗口模式 -->
    <div id="mainWindow" class="window">
      <header class="titlebar">
        <div class="title-left">
          <img src="./app-icon.svg" class="app-svg" alt="icon" />
          <span class="app-name">Hooly</span>
        </div>
        <div class="toolbar">
          <button id="addBtn" class="icon-btn" title="手动添加">＋</button>
          <button id="calendarBtn" class="icon-btn" title="日历视图">📅</button>
          <button id="openSettingsBtn" class="icon-btn" title="设置">⚙️</button>
          <button id="closeBtn" class="icon-btn" title="关闭">×</button>
        </div>
      </header>

      <main class="content">
        <!-- 待办列表核心区域 -->
        <div class="todo-container">
          <ul id="todoList" class="todo-list">
            <li class="empty-state">拖入图片或粘贴文本，AI 自动生成待办</li>
          </ul>
          
          <!-- 日历视图 -->
          <div id="calendarView" class="calendar-view hidden">
            <div class="calendar-header">
              <button class="calendar-nav-btn" id="prevMonthBtn">◀</button>
              <span class="calendar-title" id="calendarTitle">2024年3月</span>
              <button class="calendar-nav-btn" id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
              <!-- 动态生成 -->
            </div>
            <div class="calendar-divider"></div>
            <div class="calendar-detail-area">
              <div class="detail-header" id="detailDateTitle">3月12日 周三</div>
              <ul class="detail-list" id="detailList">
                <!-- 动态生成 -->
              </ul>
            </div>
          </div>
        </div>
        
        <!-- 隐式输入反馈遮罩 -->
        <div id="dropOverlay" class="drop-overlay hidden">
          <div class="overlay-content">
            <img src="./app-icon.svg" class="overlay-icon" alt="icon" />
            <span class="overlay-text">释放以分析</span>
          </div>
        </div>

        <!-- 底部微输入栏 -->
        <div class="micro-input-bar">
          <input id="microInput" type="text" placeholder="输入待办..." />
          <button id="captureBtn" class="micro-btn" title="截图">📷</button>
        </div>
      </main>

      <!-- 隐藏的文件输入 -->
      <input id="fileInput" type="file" accept="image/*" hidden />
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>欢迎来到 Hooly</h3>
          <p class="modal-subtitle">让我们更了解你，以提供精准的 AI 协助</p>
        </div>
        
        <div class="modal-body">
          <div class="form-section">
            <h4>个人画像</h4>
            <div class="form-group">
              <label>你的昵称</label>
              <input id="nicknameInput" type="text" placeholder="例如：Alex" />
            </div>
            <div class="form-group">
              <label>你的职业</label>
              <div class="input-with-tags">
                <input id="jobInput" type="text" placeholder="例如：产品经理" list="jobList" />
                <datalist id="jobList">
                  <option value="程序员"></option>
                  <option value="产品经理"></option>
                  <option value="设计师"></option>
                  <option value="学生"></option>
                  <option value="运营"></option>
                </datalist>
              </div>
            </div>
            <div class="form-group">
              <label>当前关注重心</label>
              <textarea id="focusInput" rows="2" placeholder="例如：正在准备考研复习，或者正在冲刺 Q3 业绩目标..."></textarea>
            </div>
          </div>

          <div class="form-section">
            <h4>音效设置</h4>
            <div class="form-group row-group">
              <label>开启音效</label>
              <label class="switch">
                <input id="soundEnabledInput" type="checkbox" checked />
                <span class="slider round"></span>
              </label>
            </div>
            <div class="form-group">
              <label>音效主题</label>
              <select id="soundThemeInput">
                <option value="cute">奶呼呼 (默认)</option>
                <option value="pixel">像素风 (8-bit)</option>
                <option value="bubble">果冻泡泡</option>
              </select>
            </div>
            <div class="form-group">
              <label>音量大小</label>
              <input id="soundVolumeInput" type="range" min="0" max="100" value="50" />
            </div>
          </div>

          <div class="form-section">
            <h4>AI 配置</h4>
            <div class="form-group">
              <label>API Base URL</label>
              <input id="baseUrlInput" type="text" placeholder="https://api.openai.com/v1" />
            </div>
            <div class="form-group">
              <label>API Key</label>
              <input id="apiKeyInput" type="password" placeholder="sk-..." />
            </div>
            <div class="form-group">
              <label>模型</label>
              <input id="modelInput" type="text" placeholder="gpt-4o-mini" />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button id="cancelSettingsBtn" class="ghost-btn">稍后设置</button>
          <button id="saveSettingsBtn" class="primary-btn">开始旅程</button>
        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
